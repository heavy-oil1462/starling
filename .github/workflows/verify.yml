# The design gate: CI runs exactly what the local verify skill runs
# (scripts/regen_all.py --check), on every push and PR.
#
# No nix: the latest OpenSCAD snapshot AppImage, handed to the scripts
# via $OPENSCAD (render_scad.py's no-nix escape hatch). The byte drift
# comparison self-skips when the AppImage version differs from the one
# recorded in stl/openscad_version.txt; every other check (params, throw,
# warnings, manifold status, orphaned STLs) runs at full strength. The
# pinned nix path remains the local default.
#
# The scripts are stdlib-only, so the runner's python3 is enough.
name: verify

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install OpenSCAD nightly
        # AppImage from the official snapshot server, extracted so no
        # FUSE is needed (there is no nightly PPA)
        run: |
          latest=$(curl -s https://files.openscad.org/snapshots/ \
            | grep -oE 'OpenSCAD-[0-9.]+-x86_64\.AppImage' | sort -u | tail -1)
          echo "using $latest"
          curl -sLO "https://files.openscad.org/snapshots/$latest"
          chmod +x "$latest"
          "./$latest" --appimage-extract > /dev/null
          echo "OPENSCAD=$PWD/squashfs-root/AppRun" >> "$GITHUB_ENV"
          # the AppImage expects the system GL runtime, which the bare
          # runner image does not ship
          sudo apt-get update && sudo apt-get install -y xvfb \
            libegl1 libegl-mesa0 libgl1 libglx-mesa0 libgbm1 libopengl0
          "$PWD/squashfs-root/AppRun" --version
      - name: verify gate
        run: xvfb-run -a python3 scripts/regen_all.py --check
